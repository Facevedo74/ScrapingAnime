replicaCount: 2

image:
  repository: facevedo74/scraping-anime
  tag: "48285056887133b8dba4f56f9a1129251de3a666"
  pullPolicy: Always

service:
  type: ClusterIP
  port: 80
  targetPort: 3000

env:
  PORT: "3000"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

probes:
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 20
