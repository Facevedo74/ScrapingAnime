replicaCount: 2

image:
  repository: facevedo74/scraping-anime
  tag: "877e0361863f77eef56cde413473c900e9070473"
  pullPolicy: Always

service:
  type: LoadBalancer
  port: 80
  targetPort: 3000
  loadBalancerIP: "172.202.10.115"

env:
  PORT: "3000"

resources:
  requests:
    cpu: "100m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "256Mi"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 6
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

probes:
  readiness:
    path: /
    initialDelaySeconds: 5
    periodSeconds: 10
  liveness:
    path: /
    initialDelaySeconds: 10
    periodSeconds: 20
