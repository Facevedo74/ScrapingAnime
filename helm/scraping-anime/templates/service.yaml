apiVersion: v1
kind: Service
metadata:
  name: {{ include "scraping-anime.fullname" . }}
  labels:
    {{- include "scraping-anime.labels" . | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  selector:
    {{- include "scraping-anime.selectorLabels" . | nindent 4 }}
  ports:
    - protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
