apiVersion: apps/v1
kind: Deployment
metadata:
  name: scraping-anime
  labels:
    app: scraping-anime
spec:
  replicas: 2
  selector:
    matchLabels:
      app: scraping-anime
  template:
    metadata:
      labels:
        app: scraping-anime
    spec:
      containers:
        - name: scraping-anime
          image: scraping-anime:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          env:
            - name: PORT
              value: "3000"
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 20
