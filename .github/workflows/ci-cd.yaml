name: CI/CD Pipeline

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ─── 1. BUILD & COMPILE ────────────────────────────────────
  build:
    name: Build TypeScript
    runs-on: ubuntu-latest

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Instalar dependencias
        run: npm install

      - name: Compilar TypeScript
        run: npm run build

  # ─── 2. DOCKER BUILD & PUSH ────────────────────────────────
  docker:
    name: Docker Build & Push
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'

    outputs:
      image_tag: ${{ github.sha }}

    steps:
      - name: Checkout código
        uses: actions/checkout@v4

      - name: Login a Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up QEMU (multi-platform)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push imagen
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: |
            facevedo74/scraping-anime:latest
            facevedo74/scraping-anime:${{ github.sha }}

  # ─── 3. UPDATE HELM → DISPARA ARGOCD ───────────────────────
  deploy:
    name: Update Helm Tag → ArgoCD Sync
    runs-on: ubuntu-latest
    needs: docker
    if: github.ref == 'refs/heads/main'
    environment: production    
    permissions:
      contents: write

    steps:
      - name: Checkout código
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Actualizar image tag en values.yaml
        run: |
          sed -i "s|tag:.*|tag: \"${{ github.sha }}\"|" helm/scraping-anime/values.yaml

      - name: Commit y push del nuevo tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add helm/scraping-anime/values.yaml
          git commit -m "ci: update image tag to ${{ github.sha }}"
          git push origin main
